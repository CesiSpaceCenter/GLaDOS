; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = ./boards

[env]
framework = arduino
extra_scripts = pre:compiledb.py
monitor_speed = 115200
monitor_echo = yes

[STM32]
platform = ststm32
upload_protocol = dfu
build_flags =
	-D PIO_FRAMEWORK_ARDUINO_NANOLIB_FLOAT_PRINTF
	-D PIO_FRAMEWORK_ARDUINO_SERIAL_WITHOUT_GENERIC
	-D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
	-D USBCON

[env:SCU]
extends = STM32
board = genericSTM32F722RE
lib_deps =
	infineon/XENSIV Digital Pressure Sensor @ ^1.0.1
	stm32duino/STM32duino FreeRTOS @ ^10.3.3
	finani/ICM42688 @ ^1.1.0
	arduino-libraries/Madgwick @ ^1.2.0
	adafruit/Adafruit SPIFlash @ ^5.1.1
	sparkfun/SparkFun u-blox GNSS v3 @ ^3.1.14
	arduino-libraries/Servo @ ^1.3.0
	https://github.com/google/flatbuffers.git#v25.12.19
